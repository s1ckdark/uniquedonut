<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Shake — Camera Reactive Donuts</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    overflow: hidden;
    background: #060812;
    font-family: 'Courier New', monospace;
    color: #fff;
    height: 100vh;
  }

  #stage {
    position: fixed;
    inset: 0;
    display: block;
  }

  #cam {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.18;
    filter: blur(2px) saturate(0.6);
    z-index: 0;
    pointer-events: none;
  }

  .overlay {
    position: fixed;
    left: 22px;
    top: 22px;
    z-index: 10;
    background: rgba(6,8,18,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 12px 16px;
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    user-select: none;
  }
  .overlay .title {
    color: #FF8C42;
    font-size: 12px;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .overlay .row { display: flex; gap: 10px; line-height: 1.7; }
  .overlay .val { color: #FFD93D; min-width: 40px; text-align: right; }

  .hint {
    position: fixed;
    right: 22px;
    bottom: 22px;
    z-index: 10;
    color: rgba(255,255,255,0.45);
    font-size: 10px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    user-select: none;
  }

  .gate {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 18px;
    background: rgba(6,8,18,0.92);
  }
  .gate h2 {
    font-size: 14px;
    letter-spacing: 3px;
    color: #FF8C42;
    text-transform: uppercase;
  }
  .gate p {
    font-size: 11px;
    letter-spacing: 1.4px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    text-align: center;
    max-width: 420px;
    line-height: 1.6;
  }
  .gate button {
    background: #FF8C42;
    color: #060812;
    border: 0;
    padding: 10px 22px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 999px;
    cursor: pointer;
    transition: transform .15s ease;
  }
  .gate button:hover { transform: scale(1.05); }
  .gate.hidden { display: none; }

  .err {
    color: #ff5060;
    font-size: 11px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    max-width: 480px;
    text-align: center;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .diag {
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    letter-spacing: 1px;
    font-family: 'Courier New', monospace;
    text-transform: none;
    margin-top: 4px;
    max-width: 520px;
    text-align: center;
    line-height: 1.5;
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<video id="cam" playsinline muted></video>
<canvas id="stage"></canvas>

<div class="overlay">
  <div class="title">Hand Shake</div>
  <div class="row">hands <span class="val" id="v-hands">0</span></div>
  <div class="row">donuts <span class="val" id="v-count">—</span></div>
  <div class="row">fps <span class="val" id="v-fps">—</span></div>
</div>

<div class="hint">Wave your hand at the camera</div>

<div class="gate" id="gate">
  <h2>Permission Required</h2>
  <p>This demo uses your camera to track hand motion locally in your browser. Nothing is uploaded.</p>
  <button id="start">Enable Camera</button>
  <div class="err" id="err"></div>
  <div class="diag" id="diag"></div>
</div>

<script type="module">
import {
  HandLandmarker,
  FilesetResolver,
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/vision_bundle.mjs";

// ---------------- Donut Grid ----------------
const DONUT_GLYPHS = ["🍩", "🍪", "🧁", "🥯", "🍰"];
const FONT = "'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif";

const stage = document.getElementById("stage");
const ctx = stage.getContext("2d");
const cam = document.getElementById("cam");

let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
let donuts = [];

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  stage.width = W * DPR;
  stage.height = H * DPR;
  stage.style.width = W + "px";
  stage.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  buildGrid();
}

function buildGrid() {
  donuts.length = 0;
  // Aim for a tile size ~80–110px depending on viewport
  const target = Math.max(70, Math.min(110, Math.round(Math.min(W, H) / 9)));
  const cols = Math.max(4, Math.round(W / target));
  const rows = Math.max(4, Math.round(H / target));
  const sx = W / cols;
  const sy = H / rows;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const ox = sx * (c + 0.5);
      const oy = sy * (r + 0.5);
      donuts.push({
        ox, oy,           // origin (rest position)
        x: ox, y: oy,     // current position
        vx: 0, vy: 0,     // velocity
        rot: 0, vr: 0,    // rotation + angular velocity
        size: Math.min(sx, sy) * 0.7,
        glyph: DONUT_GLYPHS[(r * 7 + c * 3) % DONUT_GLYPHS.length],
        seed: Math.random() * Math.PI * 2,
      });
    }
  }
  document.getElementById("v-count").textContent = donuts.length;
}

window.addEventListener("resize", resize);
resize();

// ---------------- Hand state ----------------
// fingerTips: array of {x, y, vx, vy} in screen pixels (already mirrored)
let fingerTips = [];
let palmCenters = [];
let handLandmarks = []; // array of 21-point arrays {x,y}, one per detected hand
let prevTipsByHand = new Map(); // hand index -> [{x,y}*5] last frame

// MediaPipe HandLandmarker topology
const TIP_IDX = [4, 8, 12, 16, 20];
const PALM_IDX = [0, 5, 9, 13, 17];
// Bone connections (pairs of landmark indices) for the 21-point skeleton
const HAND_BONES = [
  [0,1],[1,2],[2,3],[3,4],         // thumb
  [0,5],[5,6],[6,7],[7,8],         // index
  [5,9],[9,10],[10,11],[11,12],    // middle
  [9,13],[13,14],[14,15],[15,16],  // ring
  [13,17],[17,18],[18,19],[19,20], // pinky
  [0,17],                           // wrist → pinky base (closes palm)
];
// Palm polygon (closed loop) for filling the hand silhouette
const PALM_LOOP = [0, 1, 5, 9, 13, 17];

// ---------------- Hand interaction ----------------
// Vacuum / vortex: donuts get sucked toward palm centers, swirl, then orbit.
// Fingertips add a fine-grained tug for closer interaction.
const SUCK_RADIUS  = 320;   // palm pull range (px)
const SUCK_PULL    = 2800;  // radial accel toward palm (px/s²) — must beat SPRING
const SUCK_SWIRL   = 900;   // tangential accel for vortex feel
const ORBIT_ZONE   = 80;    // inside this radius, bleed inward velocity → orbit
const TIP_RADIUS   = 110;
const TIP_PULL     = 850;

function applyHandForce(donut, tips, palms, dt) {
  for (const palm of palms) {
    const dx = palm.x - donut.x;
    const dy = palm.y - donut.y;
    const d2 = dx * dx + dy * dy;
    if (d2 >= SUCK_RADIUS * SUCK_RADIUS) continue;

    const d = Math.max(10, Math.sqrt(d2));
    const t = 1 - d / SUCK_RADIUS;            // 0..1, closer = stronger
    const nx = dx / d, ny = dy / d;

    // Radial pull (eased so it doesn't blow up at the center)
    const pull = SUCK_PULL * t * t;
    donut.vx += nx * pull * dt;
    donut.vy += ny * pull * dt;

    // Tangential swirl — perpendicular to radial direction → vortex
    const swirl = SUCK_SWIRL * t;
    donut.vx += -ny * swirl * dt;
    donut.vy +=  nx * swirl * dt;
    donut.vr += t * 9 * dt;

    // Once we're inside the orbit zone, bleed inward speed so donuts
    // settle into an orbit instead of overshooting through the palm.
    if (d < ORBIT_ZONE) {
      const radSpeed = donut.vx * nx + donut.vy * ny;
      if (radSpeed > 0) {
        const k = (1 - d / ORBIT_ZONE) * 0.7;
        donut.vx -= nx * radSpeed * k;
        donut.vy -= ny * radSpeed * k;
      }
    }
  }

  // Fingertips: shorter range, also pull toward (so flicking your fingers
  // grabs nearby donuts). Inherits a bit of fingertip velocity for "drag".
  for (const tip of tips) {
    const dx = tip.x - donut.x;
    const dy = tip.y - donut.y;
    const d2 = dx * dx + dy * dy;
    if (d2 >= TIP_RADIUS * TIP_RADIUS || d2 < 1) continue;
    const d = Math.sqrt(d2);
    const t = 1 - d / TIP_RADIUS;
    const grab = TIP_PULL * t;
    donut.vx += (dx / d) * grab * dt;
    donut.vy += (dy / d) * grab * dt;
    donut.vx += tip.vx * t * 1.6 * dt;
    donut.vy += tip.vy * t * 1.6 * dt;
  }
}

// ---------------- Physics ----------------
const SPRING = 14;     // pull-back to origin
const DAMP = 4.5;      // velocity damping (per second)
const ROT_DAMP = 5;
const MAX_DT = 1 / 30;

function step(dt) {
  dt = Math.min(dt, MAX_DT);
  for (const d of donuts) {
    applyHandForce(d, fingerTips, palmCenters, dt);

    // Spring back to origin
    d.vx += -SPRING * (d.x - d.ox) * dt;
    d.vy += -SPRING * (d.y - d.oy) * dt;

    // Damping (exponential)
    const damp = Math.exp(-DAMP * dt);
    d.vx *= damp;
    d.vy *= damp;
    d.vr *= Math.exp(-ROT_DAMP * dt);

    // Integrate
    d.x += d.vx * dt;
    d.y += d.vy * dt;
    d.rot += d.vr * dt;
  }
}

function draw(t) {
  // Trail / fade
  ctx.fillStyle = "rgba(6, 8, 18, 0.55)";
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for (const d of donuts) {
    // Subtle idle wobble so it never looks frozen
    const idle = Math.sin(t * 0.0015 + d.seed) * 0.6;
    ctx.save();
    ctx.translate(d.x, d.y + idle);
    ctx.rotate(d.rot);
    ctx.font = `${d.size}px ${FONT}`;
    ctx.fillText(d.glyph, 0, 0);
    ctx.restore();
  }

  // Vortex rings around each palm (visual cue for the suction field)
  for (const palm of palmCenters) {
    const rings = 3;
    for (let i = 0; i < rings; i++) {
      const phase = ((t * 0.0006) + i / rings) % 1;
      const r = 30 + phase * (SUCK_RADIUS - 30);
      const alpha = (1 - phase) * 0.18;
      ctx.beginPath();
      ctx.strokeStyle = `rgba(255, 140, 66, ${alpha})`;
      ctx.lineWidth = 1.2;
      ctx.arc(palm.x, palm.y, r, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // ---- Hand skeleton + palm silhouette ----
  for (const hand of handLandmarks) {
    // Palm fill — closed polygon through wrist + finger bases
    ctx.beginPath();
    for (let i = 0; i < PALM_LOOP.length; i++) {
      const p = hand[PALM_LOOP[i]];
      if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.fillStyle = "rgba(255, 140, 66, 0.10)";
    ctx.fill();
    ctx.strokeStyle = "rgba(255, 140, 66, 0.35)";
    ctx.lineWidth = 1;
    ctx.stroke();

    // Bones with neon glow
    ctx.save();
    ctx.shadowColor = "rgba(255, 217, 61, 0.85)";
    ctx.shadowBlur = 12;
    ctx.strokeStyle = "rgba(255, 217, 61, 0.9)";
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.beginPath();
    for (const [a, b] of HAND_BONES) {
      ctx.moveTo(hand[a].x, hand[a].y);
      ctx.lineTo(hand[b].x, hand[b].y);
    }
    ctx.stroke();
    ctx.restore();

    // Joints (fingertips bigger + pulsing)
    const pulse = 0.5 + 0.5 * Math.sin(t * 0.006);
    for (let i = 0; i < hand.length; i++) {
      const isTip = TIP_IDX.includes(i);
      const r = isTip ? 5 + pulse * 1.5 : 3;
      ctx.beginPath();
      ctx.fillStyle = isTip
        ? `rgba(255, 217, 61, ${0.85 + pulse * 0.15})`
        : "rgba(255, 217, 61, 0.85)";
      ctx.arc(hand[i].x, hand[i].y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ---------------- Camera + MediaPipe ----------------
let landmarker = null;

async function initLandmarker() {
  const fileset = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/wasm"
  );
  landmarker = await HandLandmarker.createFromOptions(fileset, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU",
    },
    runningMode: "VIDEO",
    numHands: 2,
    minHandDetectionConfidence: 0.5,
    minHandPresenceConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });
}

async function initCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" },
    audio: false,
  });
  cam.srcObject = stream;
  await cam.play();
}

let lastVideoTime = -1;
let lastDetectTime = performance.now();

function detectHands(now) {
  if (!landmarker || cam.readyState < 2) return;
  if (cam.currentTime === lastVideoTime) return;
  lastVideoTime = cam.currentTime;

  const result = landmarker.detectForVideo(cam, now);
  const dt = Math.max(1e-3, (now - lastDetectTime) / 1000);
  lastDetectTime = now;

  const newTips = [];
  const newPalms = [];
  const newHands = [];
  const tipsByHand = new Map();

  if (result.landmarks && result.landmarks.length) {
    result.landmarks.forEach((lm, hi) => {
      // Mirror all 21 landmarks once; reuse for tips, palm, and rendering
      const handPts = lm.map(p => ({ x: (1 - p.x) * W, y: p.y * H }));
      newHands.push(handPts);

      const prev = prevTipsByHand.get(hi) || [];
      const handTips = [];
      TIP_IDX.forEach((idx, i) => {
        const { x, y } = handPts[idx];
        const p = prev[i];
        const vx = p ? (x - p.x) / dt : 0;
        const vy = p ? (y - p.y) / dt : 0;
        newTips.push({ x, y, vx, vy });
        handTips.push({ x, y });
      });
      tipsByHand.set(hi, handTips);

      // palm center = mean of palm landmarks
      let px = 0, py = 0;
      for (const idx of PALM_IDX) {
        px += handPts[idx].x;
        py += handPts[idx].y;
      }
      newPalms.push({ x: px / PALM_IDX.length, y: py / PALM_IDX.length });
    });
  }

  fingerTips = newTips;
  palmCenters = newPalms;
  handLandmarks = newHands;
  prevTipsByHand = tipsByHand;
  document.getElementById("v-hands").textContent = result.landmarks?.length || 0;
}

// ---------------- Main loop ----------------
let lastFrame = performance.now();
let fpsAccum = 0, fpsCount = 0, fpsT = lastFrame;

function loop(now) {
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;

  detectHands(now);
  step(dt);
  draw(now);

  fpsAccum += dt;
  fpsCount++;
  if (now - fpsT >= 500) {
    document.getElementById("v-fps").textContent = Math.round(fpsCount / fpsAccum);
    fpsAccum = 0;
    fpsCount = 0;
    fpsT = now;
  }
  requestAnimationFrame(loop);
}

// ---------------- Boot ----------------
const gate = document.getElementById("gate");
const errEl = document.getElementById("err");
const diagEl = document.getElementById("diag");

async function diagnose() {
  const lines = [];
  lines.push(`origin: ${location.origin}`);
  lines.push(`secure context: ${window.isSecureContext}`);
  lines.push(`mediaDevices: ${!!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)}`);
  // In iframes, check feature policy
  if (document.featurePolicy) {
    try {
      lines.push(`featurePolicy.camera allowed: ${document.featurePolicy.allowsFeature("camera")}`);
    } catch {}
  }
  if (navigator.permissions && navigator.permissions.query) {
    try {
      const p = await navigator.permissions.query({ name: "camera" });
      lines.push(`permissions.camera: ${p.state}`);
    } catch (e) {
      lines.push(`permissions.camera: query unsupported (${e.name})`);
    }
  }
  if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
    try {
      const ds = await navigator.mediaDevices.enumerateDevices();
      const cams = ds.filter(d => d.kind === "videoinput");
      lines.push(`videoinput devices: ${cams.length}`);
    } catch {}
  }
  return lines.join("\n");
}

function explainError(e) {
  if (!e) return "Unknown error";
  switch (e.name) {
    case "NotAllowedError":
      return "Permission denied — check browser site settings (camera blocked).";
    case "NotFoundError":
      return "No camera found on this device.";
    case "NotReadableError":
      return "Camera is in use by another application.";
    case "OverconstrainedError":
      return "Requested camera constraints not satisfiable.";
    case "SecurityError":
      return "Blocked by Permissions Policy or insecure context (use https or localhost).";
    case "AbortError":
      return "Camera start aborted.";
    default:
      return `${e.name || "Error"}: ${e.message || String(e)}`;
  }
}

(async () => {
  diagEl.textContent = await diagnose();
})();

document.getElementById("start").addEventListener("click", async () => {
  errEl.textContent = "";
  try {
    if (!window.isSecureContext) {
      throw new DOMException("Insecure context — getUserMedia requires HTTPS or localhost.", "SecurityError");
    }
    if (!navigator.mediaDevices?.getUserMedia) {
      throw new DOMException("navigator.mediaDevices.getUserMedia not available in this context.", "SecurityError");
    }
    await initCamera();
    await initLandmarker();
    gate.classList.add("hidden");
    requestAnimationFrame(loop);
  } catch (e) {
    console.error("[hand-shake] init failed", e);
    errEl.textContent = explainError(e);
    diagEl.textContent = await diagnose();
  }
});
</script>
</body>
</html>
