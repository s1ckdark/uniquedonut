<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Display Sample</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.3);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .data-card {
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
        }
        
        .data-section {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .data-section:last-child {
            margin-bottom: 0;
        }
        
        .section-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #00ffcc;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .icon {
            font-size: 1.5rem;
        }
        
        .data-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .data-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        
        .data-label {
            font-weight: 500;
            opacity: 0.8;
        }
        
        .data-value {
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .loading {
            text-align: center;
            opacity: 0.7;
            font-style: italic;
        }
        
        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 10px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 8px;
            margin-top: 10px;
        }
        
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .weather-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .temperature {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 5px;
        }
        
        .weather-description {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 15px;
        }
        
        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .weather-detail {
            text-align: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        
        .weather-detail-value {
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .weather-detail-label {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 3px;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-button">← 뒤로가기</a>
    
    <header class="header">
        <h1>데이터 디스플레이 샘플</h1>
        <p>위치, 날씨, 시간 정보를 실시간으로 표시</p>
    </header>
    
    <main class="main-container">
        <div class="data-card">
            <!-- 시간 정보 -->
            <div class="data-section">
                <h3 class="section-title">
                    <span class="icon">🕐</span>
                    현재 시간
                    <span class="status-indicator"></span>
                </h3>
                <div id="time-data">
                    <div class="loading">시간 정보를 불러오는 중...</div>
                </div>
            </div>
            
            <!-- 위치 정보 -->
            <div class="data-section">
                <h3 class="section-title">
                    <span class="icon">📍</span>
                    위치 정보
                </h3>
                <div id="location-data">
                    <div class="loading">위치 정보를 불러오는 중...</div>
                </div>
            </div>
            
            <!-- 날씨 정보 -->
            <div class="data-section">
                <h3 class="section-title">
                    <span class="icon">🌤️</span>
                    날씨 정보
                </h3>
                <div id="weather-data">
                    <div class="loading">날씨 정보를 불러오는 중...</div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import dataProvider from '../modules/data-provider.js';
        
        // 데이터 표시 함수들
        function displayTimeData(timeData) {
            const container = document.getElementById('time-data');
            container.innerHTML = `
                <div class="data-item">
                    <span class="data-label">날짜</span>
                    <span class="data-value">${timeData.formatted.date}</span>
                </div>
                <div class="data-item">
                    <span class="data-label">시간</span>
                    <span class="data-value">${timeData.formatted.time}</span>
                </div>
                <div class="data-item">
                    <span class="data-label">요일</span>
                    <span class="data-value">${timeData.dayOfWeek}요일</span>
                </div>
                <div class="data-item">
                    <span class="data-label">전체</span>
                    <span class="data-value">${timeData.formatted.datetime}</span>
                </div>
            `;
        }
        
        function displayLocationData(locationData) {
            const container = document.getElementById('location-data');
            
            if (!locationData) {
                container.innerHTML = '<div class="error">위치 정보를 가져올 수 없습니다</div>';
                return;
            }
            
            const sourceLabels = {
                'gps': '📍 GPS',
                'ip': '🌐 IP',
                'default': '📌 기본값'
            };
            const sourceLabel = sourceLabels[locationData.source] || '📍';
            
            container.innerHTML = `
                <div class="data-item">
                    <span class="data-label">출처</span>
                    <span class="data-value">${sourceLabel}</span>
                </div>
                <div class="data-item">
                    <span class="data-label">도시</span>
                    <span class="data-value">${locationData.city || '알 수 없음'}</span>
                </div>
                <div class="data-item">
                    <span class="data-label">국가</span>
                    <span class="data-value">${locationData.country || '알 수 없음'}</span>
                </div>
                <div class="data-item">
                    <span class="data-label">위도</span>
                    <span class="data-value">${locationData.lat?.toFixed(4) || 'N/A'}</span>
                </div>
                <div class="data-item">
                    <span class="data-label">경도</span>
                    <span class="data-value">${locationData.lon?.toFixed(4) || 'N/A'}</span>
                </div>
                ${locationData.accuracy ? `
                <div class="data-item">
                    <span class="data-label">정확도</span>
                    <span class="data-value">±${locationData.accuracy.toFixed(0)}m</span>
                </div>
                ` : ''}
            `;
        }
        
        function displayWeatherData(weatherData) {
            const container = document.getElementById('weather-data');
            
            if (!weatherData) {
                container.innerHTML = '<div class="error">날씨 정보를 가져올 수 없습니다</div>';
                return;
            }
            
            const weatherIcons = {
                '01d': '☀️', '01n': '🌙',
                '02d': '⛅', '02n': '☁️',
                '03d': '☁️', '03n': '☁️',
                '04d': '☁️', '04n': '☁️',
                '09d': '🌧️', '09n': '🌧️',
                '10d': '🌦️', '10n': '🌧️',
                '11d': '⛈️', '11n': '⛈️',
                '13d': '❄️', '13n': '❄️',
                '50d': '🌫️', '50n': '🌫️'
            };
            
            container.innerHTML = `
                <div style="text-align: center;">
                    <div class="weather-icon">${weatherIcons[weatherData.icon] || '🌤️'}</div>
                    <div class="temperature">${weatherData.temperature}°C</div>
                    <div class="weather-description">${weatherData.description}</div>
                </div>
                <div class="weather-details">
                    <div class="weather-detail">
                        <div class="weather-detail-value">${weatherData.humidity}%</div>
                        <div class="weather-detail-label">습도</div>
                    </div>
                    <div class="weather-detail">
                        <div class="weather-detail-value">${weatherData.windSpeed.toFixed(1)}m/s</div>
                        <div class="weather-detail-label">풍속</div>
                    </div>
                    <div class="weather-detail">
                        <div class="weather-detail-value">${weatherData.pressure}hPa</div>
                        <div class="weather-detail-label">기압</div>
                    </div>
                    <div class="weather-detail">
                        <div class="weather-detail-value">${weatherData.visibility.toFixed(1)}km</div>
                        <div class="weather-detail-label">가시거리</div>
                    </div>
                </div>
                ${weatherData.simulated ? '<div class="error" style="margin-top: 15px;">⚠️ 시뮬레이션 데이터 (API 키 필요)</div>' : ''}
            `;
        }
        
        // 데이터 구독 및 표시
        function updateDisplay(data) {
            displayTimeData(data.time);
            displayLocationData(data.location);
            displayWeatherData(data.weather);
        }
        
        // 데이터 제공자 구독 시작
        const unsubscribe = dataProvider.subscribe(updateDisplay);
        
        // 페이지 언로드 시 구독 해제
        window.addEventListener('beforeunload', unsubscribe);
        
        // 1초마다 시간만 업데이트 (시간은 실시간으로)
        setInterval(() => {
            const timeData = dataProvider.getCurrentTime();
            displayTimeData(timeData);
        }, 1000);
    </script>
</body>
</html>
