<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfall - Cosmic Particle Rain</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #02020c;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: rgba(10, 10, 30, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.06);
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            z-index: 100;
            min-width: 140px;
        }
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }
        .control-row:last-child { margin-bottom: 0; }
        .control-row label {
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .control-row input[type="range"] {
            width: 70px;
            height: 2px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255,255,255,0.15);
            border-radius: 1px;
            outline: none;
        }
        .control-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(180, 200, 255, 0.8);
            cursor: pointer;
            box-shadow: 0 0 6px rgba(180, 200, 255, 0.5);
        }
        .title-label {
            position: fixed;
            top: 16px;
            left: 16px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: rgba(255,255,255,0.25);
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 100;
        }

    </style>
</head>
<body>
    <div class="title-label">Starfall</div>
    
    <div id="canvas-container"></div>

    <div class="controls">
        <div class="control-row">
            <label>Speed</label>
            <input type="range" id="ctrl-speed" min="0.2" max="3" step="0.1" value="1">
        </div>
        <div class="control-row">
            <label>Depth</label>
            <input type="range" id="ctrl-depth" min="0.2" max="2.5" step="0.1" value="1">
        </div>
        <div class="control-row">
            <label>Stars</label>
            <input type="range" id="ctrl-count" min="50" max="800" step="10" value="300">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script type="module">
        import Starfall from '../modules/starfall.js';

        const sf = new Starfall({
            container: '#canvas-container',
            starCount: 300,
            speedMultiplier: 1,
            depthMultiplier: 1,
            mouseInfluence: 1,
            layers: 3
        });

        document.getElementById('ctrl-speed').addEventListener('input', e => {
            sf.setSpeed(Number(e.target.value));
        });

        document.getElementById('ctrl-depth').addEventListener('input', e => {
            sf.setDepth(Number(e.target.value));
        });

        document.getElementById('ctrl-count').addEventListener('input', e => {
            sf.setStarCount(Number(e.target.value));
        });
    </script>
</body>
</html>
