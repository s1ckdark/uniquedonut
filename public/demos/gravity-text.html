<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAVITY TEXT - Interactive Typography</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #canvas-container canvas {
            display: block;
        }

        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .theme-btn:hover {
            transform: scale(1.15);
            border-color: rgba(255,255,255,0.8);
        }

        .theme-btn.active {
            border-color: #fff;
            box-shadow: 0 0 12px rgba(255,255,255,0.5);
        }

        .theme-btn[data-theme="aurora"]  { background: linear-gradient(135deg, #00ffb4, #50c8ff, #a064ff); }
        .theme-btn[data-theme="ember"]   { background: linear-gradient(135deg, #ff5014, #ffa028, #ffdc3c); }
        .theme-btn[data-theme="ocean"]   { background: linear-gradient(135deg, #003cb4, #00b4ff, #50dcff); }
        .theme-btn[data-theme="neon"]    { background: linear-gradient(135deg, #ff00ff, #00ffff, #ffff00); }
        .theme-btn[data-theme="mono"]    { background: linear-gradient(135deg, #666, #ccc, #fff); }

        .tooltip {
            position: absolute;
            right: 50px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .theme-btn:hover .tooltip {
            opacity: 1;
        }

        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
        }

        .info-panel span {
            color: rgba(255,255,255,0.8);
        }

        .title-label {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .param-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .param-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .param-row label {
            color: rgba(255,255,255,0.5);
            font-size: 10px;
            font-family: 'Courier New', monospace;
            width: 70px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .param-row input[type="range"] {
            width: 100px;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            outline: none;
        }

        .param-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.7);
            cursor: pointer;
        }

        .trail-toggle {
            color: rgba(255,255,255,0.5);
            font-size: 10px;
            font-family: 'Courier New', monospace;
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .trail-toggle:hover {
            border-color: rgba(255,255,255,0.5);
            color: rgba(255,255,255,0.8);
        }

        .trail-toggle.active {
            border-color: rgba(255,255,255,0.6);
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 200;
            text-decoration: none;
            color: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            transition: all 0.2s;
            font-family: 'Courier New', monospace;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <a href="../index.html" class="back-btn">← Back to List</a>

    <div class="title-label">Gravity Text</div>

    <div class="controls">
        <button class="theme-btn active" data-theme="aurora">
            <span class="tooltip">Aurora</span>
        </button>
        <button class="theme-btn" data-theme="ember">
            <span class="tooltip">Ember</span>
        </button>
        <button class="theme-btn" data-theme="ocean">
            <span class="tooltip">Ocean</span>
        </button>
        <button class="theme-btn" data-theme="neon">
            <span class="tooltip">Neon</span>
        </button>
        <button class="theme-btn" data-theme="mono">
            <span class="tooltip">Mono</span>
        </button>
    </div>

    <div class="info-panel">
        <div>particles: <span id="info-count">—</span></div>
        <div>fps: <span id="info-fps">—</span></div>
        <div>theme: <span id="info-theme">aurora</span></div>
    </div>

    <div class="param-controls">
        <div class="param-row">
            <label>Radius</label>
            <input type="range" id="param-radius" min="50" max="300" value="150">
        </div>
        <div class="param-row">
            <label>Repulse</label>
            <input type="range" id="param-repulse" min="1" max="20" value="8">
        </div>
        <div class="param-row">
            <label>Gravity</label>
            <input type="range" id="param-gravity" min="0" max="2" step="0.1" value="0.6">
        </div>
        <div class="param-row">
            <button class="trail-toggle active" id="toggle-trails">Trails On</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script type="module">
        import { GravityText } from '../modules/gravity-text.js';

        const gt = new GravityText({
            container: '#canvas-container',
            text: 'GRAVITY',
            fontSize: Math.min(window.innerWidth * 0.14, 200),
            theme: 'aurora',
            particleDensity: 4,
            repulsionRadius: 150,
            repulsionStrength: 8,
            gravityStrength: 0.6,
            showTrails: true,
        });

        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const theme = btn.dataset.theme;
                gt.setTheme(theme);
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('info-theme').textContent = theme;
            });
        });

        document.getElementById('param-radius').addEventListener('input', e => {
            gt.setParams({ repulsionRadius: Number(e.target.value) });
        });

        document.getElementById('param-repulse').addEventListener('input', e => {
            gt.setParams({ repulsionStrength: Number(e.target.value) });
        });

        document.getElementById('param-gravity').addEventListener('input', e => {
            gt.setParams({ gravityStrength: Number(e.target.value) });
        });

        const trailBtn = document.getElementById('toggle-trails');
        trailBtn.addEventListener('click', () => {
            const next = !gt.showTrails;
            gt.setParams({ showTrails: next });
            trailBtn.textContent = next ? 'Trails On' : 'Trails Off';
            trailBtn.classList.toggle('active', next);
        });

        let frameCount = 0;
        let lastFpsTime = performance.now();

        function updateInfo() {
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                document.getElementById('info-fps').textContent = frameCount;
                document.getElementById('info-count').textContent = gt.particles.length.toLocaleString();
                frameCount = 0;
                lastFpsTime = now;
            }
            requestAnimationFrame(updateInfo);
        }
        updateInfo();
    </script>
</body>
</html>
