<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Terrain Map</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        
        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-radius: 12px;
            color: #fff;
            z-index: 100;
            min-width: 200px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .controls h3 {
            margin: 0 0 12px 0;
            font-size: 14px;
            color: #00ffcc;
            letter-spacing: 1px;
        }
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            gap: 10px;
        }
        .control-row:last-child { margin-bottom: 0; }
        .control-row label {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .control-row input[type="range"] {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            outline: none;
        }
        .control-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ffcc;
            cursor: pointer;
        }
        .control-row select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 16px;
            border-radius: 8px;
            color: rgba(255,255,255,0.7);
            font-size: 11px;
            z-index: 100;
        }
        .info span { color: #00ffcc; }
        
        .hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 14px;
            border-radius: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    
    
    <div class="controls">
        <h3>🗺️ Terrain Controls</h3>
        <div class="control-row">
            <label>Height Scale</label>
            <input type="range" id="heightScale" min="1" max="50" value="20">
        </div>
        <div class="control-row">
            <label>Detail</label>
            <input type="range" id="detail" min="1" max="8" value="4" step="1">
        </div>
        <div class="control-row">
            <label>Roughness</label>
            <input type="range" id="roughness" min="0.1" max="2" value="0.8" step="0.1">
        </div>
        <div class="control-row">
            <label>Color Theme</label>
            <select id="colorTheme">
                <option value="earth">Earth</option>
                <option value="ocean">Ocean</option>
                <option value="mars">Mars</option>
                <option value="neon">Neon</option>
                <option value="grayscale">Grayscale</option>
            </select>
        </div>
        <div class="control-row">
            <label>Wireframe</label>
            <input type="checkbox" id="wireframe">
        </div>
    </div>
    
    <div class="info">
        Vertices: <span id="vertexCount">0</span> | 
        FPS: <span id="fps">0</span>
    </div>
    
    <div class="hint">
        🖱️ Drag: Rotate | Scroll: Zoom | Right-click: Pan
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 100, 300);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(80, 60, 80);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI * 0.45;
        controls.minDistance = 20;
        controls.maxDistance = 200;
        
        const ambientLight = new THREE.AmbientLight(0x404050, 0.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(50, 100, 50);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.near = 10;
        directionalLight.shadow.camera.far = 300;
        directionalLight.shadow.camera.left = -100;
        directionalLight.shadow.camera.right = 100;
        directionalLight.shadow.camera.top = 100;
        directionalLight.shadow.camera.bottom = -100;
        scene.add(directionalLight);

        const colorThemes = {
            earth: {
                low: new THREE.Color(0x1a5f1a),
                mid: new THREE.Color(0x8b7355),
                high: new THREE.Color(0x8b8989),
                peak: new THREE.Color(0xffffff)
            },
            ocean: {
                low: new THREE.Color(0x001a33),
                mid: new THREE.Color(0x0066cc),
                high: new THREE.Color(0x00ccff),
                peak: new THREE.Color(0xffffff)
            },
            mars: {
                low: new THREE.Color(0x8b4513),
                mid: new THREE.Color(0xcd853f),
                high: new THREE.Color(0xdaa520),
                peak: new THREE.Color(0xffd700)
            },
            neon: {
                low: new THREE.Color(0x000033),
                mid: new THREE.Color(0x9900ff),
                high: new THREE.Color(0xff00ff),
                peak: new THREE.Color(0x00ffff)
            },
            grayscale: {
                low: new THREE.Color(0x1a1a1a),
                mid: new THREE.Color(0x666666),
                high: new THREE.Color(0xaaaaaa),
                peak: new THREE.Color(0xffffff)
            }
        };

        function noise2D(x, y, seed = 0) {
            const n = Math.sin(x * 12.9898 + y * 78.233 + seed) * 43758.5453;
            return n - Math.floor(n);
        }

        function smoothNoise(x, y, seed) {
            const ix = Math.floor(x);
            const iy = Math.floor(y);
            const fx = x - ix;
            const fy = y - iy;
            
            const a = noise2D(ix, iy, seed);
            const b = noise2D(ix + 1, iy, seed);
            const c = noise2D(ix, iy + 1, seed);
            const d = noise2D(ix + 1, iy + 1, seed);
            
            const ux = fx * fx * (3 - 2 * fx);
            const uy = fy * fy * (3 - 2 * fy);
            
            return a * (1 - ux) * (1 - uy) + b * ux * (1 - uy) + c * (1 - ux) * uy + d * ux * uy;
        }

        function fbm(x, y, octaves, seed) {
            let value = 0;
            let amplitude = 1;
            let frequency = 1;
            let maxValue = 0;
            
            for (let i = 0; i < octaves; i++) {
                value += amplitude * smoothNoise(x * frequency, y * frequency, seed + i * 100);
                maxValue += amplitude;
                amplitude *= 0.5;
                frequency *= 2;
            }
            
            return value / maxValue;
        }

        let terrain = null;
        let terrainParams = {
            size: 100,
            segments: 128,
            heightScale: 20,
            detail: 4,
            roughness: 0.8,
            colorTheme: 'earth',
            wireframe: false
        };

        function generateTerrain() {
            if (terrain) {
                scene.remove(terrain);
                terrain.geometry.dispose();
                terrain.material.dispose();
            }

            const { size, segments, heightScale, detail, roughness, colorTheme, wireframe } = terrainParams;
            const geometry = new THREE.PlaneGeometry(size, size, segments, segments);
            
            const positions = geometry.attributes.position.array;
            const colors = new Float32Array(positions.length);
            const theme = colorThemes[colorTheme];
            
            const seed = Math.random() * 1000;
            let minHeight = Infinity;
            let maxHeight = -Infinity;
            
            for (let i = 0; i < positions.length; i += 3) {
                const x = positions[i];
                const y = positions[i + 1];
                
                const nx = (x / size + 0.5) * roughness * 5;
                const ny = (y / size + 0.5) * roughness * 5;
                
                const height = fbm(nx, ny, detail, seed) * heightScale;
                positions[i + 2] = height;
                
                minHeight = Math.min(minHeight, height);
                maxHeight = Math.max(maxHeight, height);
            }
            
            for (let i = 0; i < positions.length; i += 3) {
                const height = positions[i + 2];
                const normalizedHeight = (height - minHeight) / (maxHeight - minHeight);
                
                let color;
                if (normalizedHeight < 0.3) {
                    color = theme.low.clone().lerp(theme.mid, normalizedHeight / 0.3);
                } else if (normalizedHeight < 0.6) {
                    color = theme.mid.clone().lerp(theme.high, (normalizedHeight - 0.3) / 0.3);
                } else if (normalizedHeight < 0.85) {
                    color = theme.high.clone().lerp(theme.peak, (normalizedHeight - 0.6) / 0.25);
                } else {
                    color = theme.peak.clone();
                }
                
                colors[i] = color.r;
                colors[i + 1] = color.g;
                colors[i + 2] = color.b;
            }
            
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.computeVertexNormals();
            
            const material = new THREE.MeshStandardMaterial({
                vertexColors: true,
                wireframe: wireframe,
                flatShading: true,
                side: THREE.DoubleSide,
                roughness: 0.8,
                metalness: 0.1
            });
            
            terrain = new THREE.Mesh(geometry, material);
            terrain.rotation.x = -Math.PI / 2;
            terrain.receiveShadow = true;
            terrain.castShadow = true;
            scene.add(terrain);
            
            document.getElementById('vertexCount').textContent = (positions.length / 3).toLocaleString();
        }

        generateTerrain();

        document.getElementById('heightScale').addEventListener('input', (e) => {
            terrainParams.heightScale = parseFloat(e.target.value);
            generateTerrain();
        });

        document.getElementById('detail').addEventListener('input', (e) => {
            terrainParams.detail = parseInt(e.target.value);
            generateTerrain();
        });

        document.getElementById('roughness').addEventListener('input', (e) => {
            terrainParams.roughness = parseFloat(e.target.value);
            generateTerrain();
        });

        document.getElementById('colorTheme').addEventListener('change', (e) => {
            terrainParams.colorTheme = e.target.value;
            generateTerrain();
        });

        document.getElementById('wireframe').addEventListener('change', (e) => {
            terrainParams.wireframe = e.target.checked;
            if (terrain) {
                terrain.material.wireframe = e.target.checked;
            }
        });

        let frameCount = 0;
        let lastFpsTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();
            renderer.render(scene, camera);
            
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastFpsTime = now;
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
